name: Deploy OCI

on:
  push:
    branches:
      - oci
  workflow_dispatch:

concurrency:
  group: deploy-oci
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js standalone
        run: |
          npm run build
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          mkdir -p .next/standalone/scripts
          cp scripts/oci-cron.sh .next/standalone/scripts/oci-cron.sh
          tar -czf stockman-oci.tar.gz -C .next/standalone .

      - name: Configure SSH
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "$OCI_HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          printf '%s\n' "$OCI_SSH_PRIVATE_KEY" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          ssh-keygen -y -f ~/.ssh/oci_key > ~/.ssh/oci_key.pub
          ssh-keygen -lf ~/.ssh/oci_key.pub

      - name: Upload release
        run: |
          scp -i ~/.ssh/oci_key stockman-oci.tar.gz \
            "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/tmp/stockman-oci-${{ github.sha }}.tar.gz"

      - name: Activate release
        env:
          OCI_DEPLOY_PATH: ${{ secrets.OCI_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/oci_key "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" \
            "sudo -n /usr/local/sbin/stockman-activate '$OCI_DEPLOY_PATH' '/tmp/stockman-oci-${{ github.sha }}.tar.gz'"
