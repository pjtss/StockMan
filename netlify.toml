[build]
command = "NODE_ENV=production npm run build"
publish = ".next"

[functions]
directory = "netlify/functions"
node_bundler = "esbuild"

[[plugins]]
package = "@netlify/plugin-nextjs"

[build.environment]
# ADMIN_PASSWORD is an intentional server-side environment variable reference.
# Keep it out of false-positive secret matches; the value itself remains Netlify-managed.
SECRETS_SCAN_OMIT_KEYS = "ADMIN_PASSWORD,ADMIN_DASHBOARD_PASSWORD,NEXT_PUBLIC_VAPID_PUBLIC_KEY,NEXT_DIST_DIR,KIS_MODE,OPENAI_MODEL,NODE_ENV"
